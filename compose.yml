services:
  rembg-api:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    ports:
      - "8001:8001"
    environment:
      - OMP_NUM_THREADS=1

  rembg-api-gpu:
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.gpu
    ports:
      - "8001:8001"
    environment:
      - OMP_NUM_THREADS=1
    gpus: all
